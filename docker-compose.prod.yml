version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # Не открываем порт наружу!

  app:
    image: yourdockerhubuser/myapp:latest   # твой образ
    command: gunicorn myapp.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/static:ro
      - media_data:/media:ro
    ports:
      - "80:80"
      - "443:443"   # после настройки SSL
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data: